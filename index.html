<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Bayswater Master Board - GitHub Final Stable</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&family=Suez+One&display=swap');
  :root { --gold: #c29d6d; }
  * { box-sizing: border-box; margin: 0; padding: 0; overflow: hidden; }
  body { background: #000; color: #fff; font-family: 'Suez One', serif; width: 100vw; height: 100vh; }
  .master-frame { height: 100vh; width: 100vw; display: flex; flex-direction: column; padding: 10px; gap: 10px; border: 12px solid var(--gold); }
  
  .branding-bar { height: 5.5vh; display: flex; align-items: center; justify-content: center; position: relative; border-bottom: 1px solid #333; }
  .branding-shul { font-size: 4.2vh; color: #FDEFD4; font-weight: bold; white-space: nowrap; line-height: 1; }
  #ENG_SIDE { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); font-size: 2.8vh; color: var(--gold); font-family: 'Assistant', sans-serif; font-weight: 700; display: flex; gap: 8px; align-items: center; direction: ltr; white-space: nowrap; }
  #WEATHER { color: #ccc; }
  #BSD { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); font-size: 2.8vh; color: var(--gold); font-family: 'Assistant', sans-serif; font-weight: 700; white-space: nowrap; }
  
  .clock-section { height: 18vh; display: flex; align-items: stretch; justify-content: space-between; border: 2px solid var(--gold); border-radius: 12px; background: #050505; overflow: hidden; }
  .main-clock { flex: 1.5; display: flex; align-items: center; justify-content: center; font-size: 19vh; line-height: 0.8; font-weight: 800; font-family: 'Assistant', sans-serif; color: white; padding: 0; margin: 0; transform: translateY(-0.5vh); }
  
  .status-stack { flex: 1; display: flex; flex-direction: column; justify-content: space-between; align-items: center; padding: 0; margin: 0; }
  .status-bound { width: 100%; height: 33.33%; display: flex; align-items: center; justify-content: center; padding: 0; margin: 0; }
  .status-bound span { display: inline-block; white-space: nowrap; line-height: 1.1; }

  .left-stack { flex: 1; display: flex; align-items: stretch; justify-content: stretch; padding: 0; margin: 0; }
  .message-box { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; font-weight: bold; border-radius: 12px; padding: 0; margin: 0; }
  .status-bound-left { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; padding: 0; margin: 0; }
  #dyn-status { display: inline-block; line-height: 1.1; width: 100%; }

  .teal-box { background: #004d40; color: #00bfa5; border: 2px solid #00bfa5; } 
  .gold-box { color: var(--gold); }

  .main-body { height: 71vh; display: flex; gap: 12px; }
  .zemanim-col { width: 20vw; border: 2px solid var(--gold); border-radius: 10px; display: flex; flex-direction: column; padding: 4px; background: #050505; }
  .z-row { display: flex; justify-content: space-between; padding: 0px 8px; border-bottom: 1px solid #222; align-items: center; flex: 1; transition: all 0.4s ease; }
  .z-label { color: var(--gold); font-size: 3.1vh; }
  .z-time { color: white; font-size: 2.9vh; font-family: 'Assistant', sans-serif; font-weight: 800; direction: ltr; }
  .z-time small { font-size: 0.75em; opacity: 0.8; }
  .active-zman { background: var(--gold) !important; }
  .active-zman .z-label, .active-zman .z-time { color: #000 !important; }

  .content-col { flex: 1; display: flex; flex-direction: column; gap: 12px; }
  .top-row, .bottom-row { height: 48%; display: flex; gap: 12px; }
  .data-box { flex: 1.2; border: 2px solid var(--gold); border-radius: 10px; background: #080808; display: flex; align-items: center; justify-content: center; padding: 15px; text-align: center; overflow: hidden; }
  .data-box span { font-weight: 800; line-height: 1.1; width: 100%; word-wrap: break-word; display: block; font-size: 4.5vh; }
  
  .img-bleed { border: 2px solid var(--gold); border-radius: 10px; background: #000; overflow: hidden; flex: 1.5; position: relative; }
  .img-bleed img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
  
  .omer-box { flex: 1; border: 2px solid var(--gold); border-radius: 10px; background: #001f1a; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; text-align: center; overflow: hidden; }
  .omer-title { font-size: 2.2vh; color: #ccc; margin-bottom: 4px; }
  #O2 { color: var(--gold); font-weight: 800; line-height: 1.1; width: 100%; display: block; font-size: 4vh; }
  #O_BECHINA { font-size: 2.8vh; color: #fff; border-top: 1px solid #444; padding-top: 5px; width: 90%; margin-top: 8px; }
</style>
</head>
<body>

<div class="master-frame">
  <div class="branding-bar">
    <div id="ENG_SIDE"><span id="ENG_DATE">--</span><span id="WEATHER"></span></div> 
    <div class="branding-shul">קהל חסידים ד'בעיסוואטער</div>
    <div id="BSD">בס"ד</div> 
  </div>
  <div class="clock-section">
    <div class="status-stack">
        <div class="status-bound"><span id="DAY_LABEL">--</span></div> 
        <div class="status-bound"><span id="DATE_LABEL" style="color: var(--gold);">טוען...</span></div> 
        <div class="status-bound"><span id="PARSHA_LABEL" style="color: #ccc;">...</span></div>
    </div>
    <div class="main-clock" id="CLOCK">00:00:00</div>
    <div class="left-stack" id="LEFT_MSG"></div>
  </div>
  <div class="main-body">
    <div class="zemanim-col" id="ZMANIM_LIST">
        <div class="z-row" id="r1"><span class="z-label">עלות השחר</span><span class="z-time" id="z1">--:--<small>:--</small></span></div>
        <div class="z-row" id="r2"><span class="z-label">הנחת תפילין</span><span class="z-time" id="z2">--:--<small>:--</small></span></div>
        <div class="z-row" id="r3"><span class="z-label">נץ החמה</span><span class="z-time" id="z3">--:--<small>:--</small></span></div>
        <div class="z-row" id="r4"><span class="z-label">סוף זק"ש מג"א</span><span class="z-time" id="z4">--:--<small>:--</small></span></div>
        <div class="z-row" id="r5"><span class="z-label">סוף זק"ש גר"א</span><span class="z-time" id="z5">--:--<small>:--</small></span></div>
        <div class="z-row" id="r6"><span class="z-label">סוף זמן תפילה</span><span class="z-time" id="z6">--:--<small>:--</small></span></div>
        <div class="z-row" id="r7"><span class="z-label">חצות היום</span><span class="z-time" id="z7">--:--<small>:--</small></span></div>
        <div class="z-row" id="r8"><span class="z-label">מנחה גדולה</span><span class="z-time" id="z8">--:--<small>:--</small></span></div>
        <div class="z-row" id="r9"><span class="z-label">פלג המנחה</span><span class="z-time" id="z9">--:--<small>:--</small></span></div>
        <div class="z-row" id="row_special" style="display:none; background:#1a3a3a;"><span class="z-label" id="z_spec_label">--</span><span class="z-time" id="z_spec_time">--:--<small>:--</small></span></div>
        <div class="z-row" id="r10"><span class="z-label">שקיעת החמה</span><span class="z-time" id="z10">--:--<small>:--</small></span></div>
        <div class="z-row" id="r11" style="background:#2b2400;"><span class="z-label" id="label_rt">רבינו תם</span><span class="z-time" id="z11">--:--<small>:--</small></span></div>
    </div>
    <div class="content-col">
      <div class="top-row">
          <div class="data-box"><span id="ANN"></span></div>
          <div class="img-bleed"><img id="p1"></div>
          <div class="data-box"><span id="TEF"></span></div>
      </div>
      <div class="bottom-row">
          <div class="img-bleed" style="flex:1.4;"><img id="p4"></div>
          <div class="omer-box" id="OMER">
              <div class="omer-title" id="OT">ספירת העומר</div>
              <span id="O2">--</span>
              <div id="O_BECHINA">--</div>
          </div>
          <div class="img-bleed" style="flex:1.4;"><img id="p5"></div>
      </div>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyLBmMyBsYacZv2Ku14XNAoG132ZZEa02ktGmQSojs7eCob9AOXALRPYyo_5QeACSnU8g/exec";
var lastIso = "", lastOmerBoxHTML = "", alosSecs = null, rtSecs = null, todayCandleSecs = null, currentZmanTimes = [], currentStatusHTML = "", currentlyHighlightedId = null;
var lastP1 = "", lastP4 = "", lastP5 = "";

// HARDCODED SCHEDULE
var schedule = {
    "2026-04-26": { day:"יום ראשון", heb:"ט׳ אייר", parsha:"אמור", omer:"ארבעה ועשרים יום שהם שלושה שבועות ושלושה ימים", bechina:"תפארת שבנצח", z:["4:35:22","5:09:44","6:02:00","8:40:35","9:26:52","10:32:54","12:53:30","1:29:00","6:19:07","7:45:38","8:58:16"] },
    "2026-05-16": { 
        day:"שבת קודש", heb:"כ״ט אייר", parsha:"במדבר", 
        moladYid:"המולד שבת קודש צופרי 8 חלקים", 
        moladEng:"The Molad will be Saturday morning", 
        z:["4:12:00","4:48:00","5:45:00","8:30:00","9:15:00","10:20:00","12:53:00","1:28:00","6:30:00","8:05:00","9:18:00"] 
    }
};

function addMins(tStr, offset) {
    if (!tStr) return tStr;
    let p = tStr.split(':'), h = parseInt(p[0]), m = parseInt(p[1]), s = p[2] || "00";
    let tm = h * 60 + m + offset, nH = Math.floor(tm / 60), nM = tm % 60;
    if (nH > 12) nH -= 12; if (nH === 0) nH = 12; 
    return nH + ":" + String(nM).padStart(2, '0') + ":" + s;
}

function fit(el, startVh) {
    if (!el) return; 
    let p = el.parentElement; 
    let vh = startVh; 
    el.style.fontSize = vh + "vh";
    while ((el.scrollHeight > p.clientHeight || el.scrollWidth > p.clientWidth) && vh > 1.0) {
        vh -= 0.1; 
        el.style.fontSize = vh + "vh";
    }
}

function loadWeather() {
    fetch("https://api.open-meteo.com/v1/forecast?latitude=40.598&longitude=-73.765&current_weather=true&temperature_unit=fahrenheit")
    .then(r => r.json()).then(data => {
        if(data && data.current_weather) $('WEATHER').innerText = " | " + Math.round(data.current_weather.temperature) + "°F";
    });
}

function updateUI() {
    let now = new Date(), h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
    let cSec = (h * 3600) + (m * 60) + s, dayW = now.getDay(); 

    $('CLOCK').innerHTML = (h % 12 || 12) + ":" + String(m).padStart(2, '0') + ":" + String(s).padStart(2, '0');
    $('ENG_DATE').innerText = now.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });

    let bDate = new Date(now.getTime()), isoB = bDate.getFullYear() + "-" + String(bDate.getMonth() + 1).padStart(2, '0') + "-" + String(bDate.getDate()).padStart(2, '0');
    let d = schedule[isoB];

    // --- SMART OMER / MOLAD / DECORUM SWAP ---
    let cMins = (h * 60) + m;
    let isMoladTime = (dayW === 6 && cMins >= 540 && cMins <= 750); 
    let boxHTML = "";
    if (isMoladTime && d && d.moladYid) {
        boxHTML = '<div class="omer-title">המולד</div><span id="O2" style="color:var(--gold); font-weight:800; display:block; direction:rtl;">' + d.moladYid + '</span><div id="O_BECHINA" style="font-size:2.4vh; color:#fff; border-top:1px solid #444; padding-top:5px; width:95%; margin-top:8px; direction:ltr; font-family:sans-serif;">' + (d.moladEng || "") + '</div>';
    } else if (d && d.omer) {
        boxHTML = '<div class="omer-title">ספירת העומר</div><span id="O2" style="color:var(--gold); font-weight:800; display:block;">היום ' + d.omer + ' לעומר</span><div id="O_BECHINA" style="font-size:2.8vh; color:#fff; border-top:1px solid #444; padding-top:5px; width:90%; margin-top:8px;">' + (d.bechina || "") + '</div>';
    } else {
        boxHTML = '<div id="O2" style="color:#fff; font-weight:800; display:block; line-height:1.4;">נא לשמור על קדושת בית הכנסת ולהימנע משיחות בזמן התפילה וקריאת התורה</div>';
    }

    if (boxHTML !== lastOmerBoxHTML) {
        $('OMER').innerHTML = boxHTML; lastOmerBoxHTML = boxHTML;
        if ($('O2')) setTimeout(() => fit($('O2'), 4.2), 50);
    }

    if (isoB !== lastIso) {
        lastIso = isoB;
        if (d) {
            $('DAY_LABEL').innerText = d.day; fit($('DAY_LABEL'), 10.0);
            $('DATE_LABEL').innerText = d.heb + " תשפ״ו"; fit($('DATE_LABEL'), 10.0);
            $('PARSHA_LABEL').innerText = d.parsha ? "פרשת " + d.parsha : ""; fit($('PARSHA_LABEL'), 10.0);
            
            if ($('label_rt')) $('label_rt').innerText = (d.day === "שבת קודש") ? 'מוצאי שבת קודש' : 'רבינו תם';
            currentZmanTimes = [];
            for (let i=1; i<=11; i++) {
                if (d.z && d.z[i-1]) {
                    let zs = (i===11) ? addMins(d.z[i-1], 1) : d.z[i-1];
                    let p = zs.split(':'), p2 = p[2]||"00";
                    $('z'+i).innerHTML = p[0] + ":" + p[1] + "<small>:" + p2 + "</small>";
                    let hh = parseInt(p[0]); if(hh<12 && i>=7) hh+=12; 
                    currentZmanTimes.push({id: 'r'+i, sec: (hh*3600) + (parseInt(p[1])*60) + parseInt(p2)});
                }
            }
            if (d.candle) {
                $('row_special').style.display = 'flex';
                let ts = addMins(d.candle, -1);
                let p = ts.split(':'); $('z_spec_time').innerHTML = p[0] + ":" + p[1] + "<small>:" + (p[2]||"00") + "</small>";
                let hh = parseInt(p[0]); if(hh<12) hh+=12; 
                todayCandleSecs = hh*3600 + parseInt(p[1])*60;
                currentZmanTimes.push({id: 'row_special', sec: todayCandleSecs});
            } else { $('row_special').style.display = 'none'; }
            currentZmanTimes.sort((a,b) => a.sec - b.sec);
        }
    }

    let isPastC = (dayW === 5 && todayCandleSecs && cSec >= todayCandleSecs);
    let isMotz = (dayW === 6 && rtSecs && cSec >= rtSecs) || (dayW === 0 && alosSecs && cSec < alosSecs);
    let isShab = isPastC || (dayW === 6 && (!rtSecs || cSec < rtSecs));

    let newHTML = isMotz ? '<div class="message-box teal-box"><div class="status-bound-left"><span id="dyn-status">מוצאי שבת קודש<br><span style="color:white;font-size:0.7em;">אתה חוננתנו</span></span></div></div>' :
                  isShab ? '<div class="message-box gold-box"><div class="status-bound-left"><span id="dyn-status">שבת קודש</span></div></div>' :
                  (d && d.rc ? '<div class="message-box teal-box"><div class="status-bound-left"><span id="dyn-status">ראש חודש<br><span style="color:white;font-size:0.7em;">יעלה ויבא</span></span></div></div>' :
                  '<div class="message-box gold-box"><div class="status-bound-left"><span id="dyn-status">מוריד הטל<br><span style="color:white;font-size:0.7em;">ותן ברכה</span></span></div></div>');

    if (newHTML !== currentStatusHTML) { 
        currentStatusHTML = newHTML; $('LEFT_MSG').innerHTML = currentStatusHTML; 
        setTimeout(() => { if ($('dyn-status')) fit($('dyn-status'), 14.0); }, 50); 
    }

    let nIdx = currentZmanTimes.findIndex(z => z.sec > cSec), tgtId = nIdx !== -1 ? currentZmanTimes[nIdx].id : null;
    if (tgtId !== currentlyHighlightedId) {
        document.querySelectorAll('.z-row').forEach(r => r.classList.remove('active-zman'));
        if (tgtId && $(tgtId)) $(tgtId).classList.add('active-zman');
        currentlyHighlightedId = tgtId;
    }
}

function loadData() {
    let x = new XMLHttpRequest(); x.open("GET", SCRIPT_URL + "?cb=" + new Date().getTime(), true);
    x.onreadystatechange = function() {
        if (x.readyState == 4 && x.status == 200) {
            try {
                let d = JSON.parse(x.responseText);
                if (d.announcements !== $('ANN').innerText) { $('ANN').innerText = d.announcements || ""; fit($('ANN'), 4.8); }
                if (d.tefila !== $('TEF').innerText) { $('TEF').innerText = d.tefila || ""; fit($('TEF'), 4.8); }
                if (d.p1) $('p1').src = "https://drive.google.com/thumbnail?id=" + d.p1 + "&sz=w1200";
                if (d.p4) $('p4').src = "https://drive.google.com/thumbnail?id=" + d.p4 + "&sz=w1200";
                if (d.p5) $('p5').src = "https://drive.google.com/thumbnail?id=" + d.p5 + "&sz=w1200";
            } catch(e){}
        }
    }; x.send();
}

setInterval(updateUI, 1000); updateUI(); loadWeather(); setInterval(loadWeather, 900000); loadData(); setInterval(loadData, 30000); 
</script>
</body>
</html>
